<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand">ASTU Complaint System - Student</span>
        <div class="d-flex align-items-center">
          <div class="dropdown me-3">
            <button
              class="btn btn-light position-relative"
              data-bs-toggle="dropdown"
            >
              🔔
              <span
                id="notificationCount"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              >
                0
              </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" id="notificationList">
              <li><span class="dropdown-item">No notifications</span></li>
            </ul>
          </div>

          <button class="btn btn-light btn-sm" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      <h3>My Complaints</h3>
      <a href="submit-complaint.html" class="btn btn-success mb-3">
        + Submit Complaint
      </a>
      <div id="complaintList"></div>
    </div>

    <script src="js/utils.js"></script>
    <script>
      protectPage("student");
    </script>
    <script src="js/student.js"></script>
    <script src="js/notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
