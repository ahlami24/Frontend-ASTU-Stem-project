<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Complaint</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 15px;
        max-width: 450px;
        width: 100%;
        text-align: center;
      }

      .container h3 {
        margin-bottom: 25px;
        color: #333;
        font-weight: bold;
      }
      .form-control {
        width: 100%;
        padding: 12px 15px;
        margin-top: 5px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        border-color: #2575fc;
        box-shadow: 0 0 8px rgba(37, 117, 252, 0.4);
        outline: none;
      }
      .btn-primary {
        background-color: #2575fc;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        background-color: #6a11cb;
        box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
      }
      @media (max-width: 500px) {
        .container {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h3>Submit Complaint</h3>

      <form id="submitForm">
        <div class="mb-3">
          <label for="complaintTitle">Title:</label>
          <input
            type="text"
            class="form-control"
            id="complaintTitle"
            required
          />
        </div>
        <div class="mb-3">
          <label for="complaintCategory">Category</label>
          <select class="form-control" id="complaintCategory" required>
            <option value="">Select Category</option>
            <option value="Dorm">Dorm</option>
            <option value="Lab">Lab</option>
            <option value="Network">Network</option>
            <option value="Classroom">Classroom</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="complaintDesc">Description</label>
          <textarea class="form-control" id="complaintDesc" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
    <script src="js/utils.js"></script>
    <script>
      protectPage("student");
    </script>
    <script src="js/student.js"></script>
    <script src="js/student-submit.js"></script>
  </body>
</html>
