<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTU Smart Complaint System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <div class="container mt-5 flex-grow-1">
      <h2 class="text-center mb-4">ASTU Smart Complaint System</h2>

      <div class="card p-4 shadow">
        <h4 class="mb-3">Login</h4>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              required
            />
          </div>
          <button type="button" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-auto">
      © 2026 ASTU Smart Complaint System | Developed by a&a
    </footer>

    <script src="js/auth.js"></script>
  </body>
</html>
