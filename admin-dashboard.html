<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand">ASTU Complaint System - Admin</span>
        <div class="d-flex align-items-center">
          <div class="dropdown me-3">
            <button
              class="btn btn-light position-relative"
              data-bs-toggle="dropdown"
            >
              🔔
              <span
                id="notificationCount"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              >
                0
              </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" id="notificationList">
              <li><span class="dropdown-item">No notifications</span></li>
            </ul>
          </div>

          <button class="btn btn-light btn-sm" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h3>Dashboard Analytics</h3>

      <div class="row">
        <div class="col-md-4">
          <div class="card text-center mb-3">
            <div class="card-body">
              <h5 class="card-title">Total Complaints</h5>
              <p class="card-text" id="totalComplaints">0</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center mb-3">
            <div class="card-body">
              <h5 class="card-title">Most Common Category</h5>
              <p class="card-text" id="commonCategory">-</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center mb-3">
            <div class="card-body">
              <h5 class="card-title">Resolution Rate</h5>
              <p class="card-text" id="resolutionRate">0%</p>
            </div>
          </div>
        </div>
      </div>

      <h5>Recent Complaints</h5>
      <div id="recentComplaints"></div>
    </div>

    <script src="js/utils.js"></script>
    <script>
      protectPage("admin");
    </script>
    <script src="js/admin.js"></script>
    <script src="js/notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
